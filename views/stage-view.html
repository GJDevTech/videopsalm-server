<!DOCTYPE html>
<html>
<head>
<title>Stage View</title>
<style>
  body { background: black; color: white; font-family: sans-serif; }
  #title { font-size: 36px; text-align: center; margin-bottom: 20px; }
  #current { font-size: 48px; text-align: center; margin: 20px; }
  #next { font-size: 28px; text-align: center; margin: 20px; color: gray; }
</style>
</head>
<body>

<div id="title"></div>
<div id="current"></div>
<div id="next"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

function removeChords(text) {
    return text.replace(/\[[^\]]+\]/g, "");
}

socket.on("slide-update", (data) => {
    const index = parseInt(data.CurrentItemIndex) - 1;
    const current = data.SongVerses[index];
    const next = data.SongVerses[index + 1];

    document.getElementById("title").innerText = data.Title;
    document.getElementById("current").innerText = current ? removeChords(current.Lyrics) : "";
    document.getElementById("next").innerText = next ? removeChords(next.Lyrics) : "";
});
</script>

</body>
</html>
